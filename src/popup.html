<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title id="page-title"></title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #2c3e50;
      --accent: #3498db;
      --border: #e0e0e0;
      --muted: #7f8c8d;
      --success: #27ae60;
    }
    body {
      margin: 0; 
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex; 
      justify-content: center;
    }
    .container {
      width: 100%; 
      max-width: 800px;
      background: var(--card);
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0; 
      margin-bottom: 24px;
      font-size: 22px; 
      color: var(--text);
    }
    h1 a {
      color: var(--accent); 
      text-decoration: none; 
      font-weight: 600;
    }
    h1 a:hover { 
      text-decoration: underline; 
    }
    
    table {
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 16px;
    }
    th, td {
      text-align: left; 
      padding: 12px 16px; 
      border-bottom: 1px solid var(--border);
    }
    th { 
      color: var(--muted); 
      font-size: 13px; 
      text-transform: uppercase; 
    }
    tr:last-child td { 
      border-bottom: none; 
    }
    
    .feed-link {
      color: var(--accent); 
      font-weight: 600; 
      text-decoration: none;
    }
    .feed-link:hover { 
      text-decoration: underline; 
    }

    .copy-btn {
      background: transparent; 
      border: 1px solid var(--border);
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer;
      font-size: 13px; 
      color: var(--text); 
      transition: all 0.2s;
    }
    .copy-btn:hover { 
      background: var(--border); 
      color: #000; 
    }

    /* Button animation on success */
    .copy-btn.copied {
      animation: pulse-green 0.6s ease-in-out;
    }

    @keyframes pulse-green {
      0% { background-color: var(--success); color: white; border-color: var(--success); }
      50% { background-color: #2ecc71; color: white; border-color: #2ecc71; }
      100% { background-color: var(--success); color: white; border-color: var(--success); }
    }

    .empty-state {
      padding: 40px; 
      text-align: center; 
      color: var(--muted);
      background: #fafafa; 
      border-radius: 12px;
      border: 2px dashed var(--border);
      font-style: italic;
    }
    .empty-state p { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="header-text"></h1>
    <div id="content"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
